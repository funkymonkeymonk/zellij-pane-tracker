name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v16
        with:
          name: devenv

      - name: Install devenv
        run: nix profile add nixpkgs#devenv

      - name: Build plugin
        shell: devenv shell bash -- -e {0}
        run: build

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: zellij-pane-tracker-${{ matrix.os }}
          path: target/wasm32-wasip1/release/zellij_pane_tracker.wasm

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          # The WASM binary is platform-independent, so just pick one
          cp artifacts/zellij-pane-tracker-ubuntu-latest/zellij_pane_tracker.wasm ./zellij_pane_tracker.wasm
          sha256sum zellij_pane_tracker.wasm > zellij_pane_tracker.wasm.sha256

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            zellij_pane_tracker.wasm
            zellij_pane_tracker.wasm.sha256
